<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100">
  <rect width="480" height="100" fill="#04090F"/>

  <!-- MARK : Balance abstraite (deux plateaux géométriques)
       Inspiration : precision architecturale, bijouterie fine -->
  <!-- Tige verticale -->
  <rect x="33" y="8" width="2" height="76" fill="#B8892A" rx="1"/>
  <!-- Point de pivot — losange central -->
  <polygon points="34,36 43,45 34,54 25,45" fill="#B8892A"/>
  <!-- Bras gauche -->
  <rect x="2" y="44" width="30" height="2" fill="#B8892A" rx="1"/>
  <!-- Bras droit -->
  <rect x="36" y="44" width="30" height="2" fill="#B8892A" rx="1"/>
  <!-- Plateau gauche (carré) -->
  <rect x="1" y="35" width="12" height="12" fill="#B8892A" rx="2" opacity="0.9"/>
  <!-- Plateau droit (carré) -->
  <rect x="55" y="35" width="12" height="12" fill="#B8892A" rx="2" opacity="0.9"/>

  <!-- Séparateur -->
  <rect x="86" y="20" width="1" height="60" fill="#B8892A" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="102" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24" font-weight="700" letter-spacing="6"
    fill="#F4F2EE">SUMERSON</text>
  <text x="104" y="67"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8" font-weight="600" letter-spacing="4"
    fill="#B8892A">AVOCATS · FISCALISTES</text>
</svg>
