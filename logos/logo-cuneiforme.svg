<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100">
  <rect width="480" height="100" fill="#04090F"/>

  <!-- MARK : Trois cunéiformes (coins / wedges horizontaux)
       Référence directe aux premières lois fiscales sumériennes
       gravées sur pierre — les sumerstones -->
  <!-- Coin 1 : long, haut -->
  <polygon points="4,14  40,23  4,32" fill="#B8892A"/>
  <!-- Coin 2 : moyen, milieu -->
  <polygon points="4,40  28,48  4,56" fill="#B8892A"/>
  <!-- Coin 3 : court, bas -->
  <polygon points="4,63  18,69  4,75" fill="#B8892A"/>

  <!-- Séparateur -->
  <rect x="56" y="20" width="1" height="60" fill="#B8892A" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="72" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24" font-weight="700" letter-spacing="6"
    fill="#F4F2EE">SUMERSON</text>
  <text x="74" y="67"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8" font-weight="600" letter-spacing="4"
    fill="#B8892A">AVOCATS · FISCALISTES</text>
</svg>
